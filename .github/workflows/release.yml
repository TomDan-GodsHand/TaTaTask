name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: dotnet publish
        run: |
          dotnet publish TaTaTask/TaTaTask.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:Version=${{ env.VERSION }} \
            -o publish/TaTaTask

      - name: Prepare release archive
        run: |
          cp deploy/tatatask.service publish/TaTaTask/
          cd publish/TaTaTask
          tar czf ../../tatatask-${{ env.VERSION }}-linux-x64.tar.gz .

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.VERSION }}
          files: |
            tatatask-${{ env.VERSION }}-linux-x64.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
